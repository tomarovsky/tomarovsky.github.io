    alt_title: "Soft-Rank Diffusion"
    paper_id: 
    authors: <b><u>Sizhuang He<sup>*</sup></u></b>, Yangtian Zhang <sup>*</sup>, Shiyang Zhang and David van Dijk
    date: Jan 2026
