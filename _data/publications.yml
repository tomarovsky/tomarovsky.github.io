    # bibtex: /assets/bibs/caddi.txt
    image: /assets/img/soft_rank_diffusion.png
    tags: ["Diffusion Models", "Discrete Diffusion", "Generative Modeling", "Learning Permutations"]
    selected: true
    summary: "We propose Soft-Rank Diffusion, a discrete diffusion framework for learning distributions over permutations on $S_n$ that replaces shuffle-based random walks with a structured soft-rank forward process. By lifting permutations to continuous relaxed ranks, we obtain smoother and more tractable trajectories, while our contextualized generalized Plackett–Luce (cGPL) denoisers provide a prefix-conditional generalization of PL-style reverse models for inherently sequential decision structure. Across sorting and combinatorial optimization benchmarks, Soft-Rank Diffusion consistently outperforms prior permutation diffusion baselines, with especially strong gains on long sequences."
    full_abstract: 'The finite symmetric group $S_n$ provides a natural domain for permutations, yet learning probability distributions on $S_n$ is challenging due to its factorially growing size and discrete, non-Euclidean structure. Recent permutation diffusion methods define forward noising via shuffle-based random walks (e.g., riffle shuffles) and learn reverse transitions with Plackett–Luce (PL) variants, but the resulting trajectories can be abrupt and increasingly hard to denoise as $n$ grows. We propose _Soft-Rank Diffusion_, a discrete diffusion framework that replaces shuffle-based corruption with a structured soft-rank forward process: we lift permutations to a continuous latent representation of order by relaxing discrete ranks into soft ranks, yielding smoother and more tractable trajectories. For the reverse process, we introduce _contextualized generalized Plackett--Luce (cGPL)_ denoisers that generalize prior PL-style parameterizations and improve expressivity for sequential decision structures. Experiments on sorting and combinatorial optimization benchmarks show that Soft-Rank Diffusion consistently outperforms prior diffusion baselines, with particularly strong gains in long-sequence and intrinsically sequential settings.'
  
  - title: "STRIDE: Post-Training LLMs to Reason and Refine Bio-Sequences via Edit Trajectories"
    alt_title: "STRIDE"
    paper_id: 
    authors: Daiheng Zhang, Shiyang Zhang, <b><u>Sizhuang He</u></b>, Yangtian Zhang and David van Dijk
    date: Jan 2026
    conference_short: In Review
    conference: In Review
    # pdf: https://arxiv.org/pdf/2502.09767
    # poster: /assets/posters/CaDDi_NeurIPS_poster.pdf
    # code: https://github.com/MrGiovanni/ContinualLearning
    # bibtex: /assets/bibs/caddi.txt
    # image: /assets/img/soft_rank_diffusion.png
    tags: ["Protein Optimization", "Large Language Models", "Generative Modeling", "Post-training"]
    # selected: true
    # summary: "We propose Soft-Rank Diffusion, a discrete diffusion framework for learning distributions over permutations on $S_n$ that replaces shuffle-based random walks with a structured soft-rank forward process. By lifting permutations to continuous relaxed ranks, we obtain smoother and more tractable trajectories, while our contextualized generalized Plackett–Luce (cGPL) denoisers provide a prefix-conditional generalization of PL-style reverse models for inherently sequential decision structure. Across sorting and combinatorial optimization benchmarks, Soft-Rank Diffusion consistently outperforms prior permutation diffusion baselines, with especially strong gains on long sequences."
    full_abstract: 'Discrete biological sequence optimization demands iterative refinement while satisfying strict syntactic constraints.
      Diffusion-based approaches provide strong progressive refinement but are not naturally aligned with discrete, grammar-constrained edit operations, whereas autoregressive LLMs readily produce valid sequences yet often lack explicit long-horizon planning.
      To close this gap, we introduce _STRIDE_ (_Sequence Trajectory Refinement via Internalized Denoising Emulation_), a post-training framework that recasts optimization as an intrinsic reasoning problem in edit space.
      Rather than relying on external agentic search loops, _STRIDE_ trains an LLM to emit a full trajectory of atomic edits as explicit Chain-of-Thought, effectively internalizing a trajectory-based refinement policy under discrete constraints.
      We instantiate _STRIDE_ with a curriculum that combines supervised fine-tuning on Levenshtein-aligned shortest-edit demonstrations with GRPO-style reinforcement learning (and variants) to align edit trajectories with task rewards.
      Across protein and molecule optimization benchmarks, _STRIDE_ consistently outperforms a diverse set of baselines, while producing candidates that maintain high structural validity and achieve improved target properties.'

  - title: Scaling Large Language Models for Next-Generation Single-Cell Analysis
    alt_title: "Cell2Sentence"
